<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <title>YouTube Embed Debug</title>
    <style>
      body {
        margin: 0;
        padding: 24px;
        font-family: Arial, sans-serif;
        background: #111;
        color: #f1f1f1;
      }

      .frame {
        max-width: 960px;
        margin: 0 auto;
      }

      iframe {
        width: 100%;
        aspect-ratio: 16 / 9;
        border: 0;
      }
    </style>
  </head>
  <body>
    <div class="frame">
      <h1>Raw YouTube Embed Test</h1>
      <p>This page uses the plain YouTube embed code with the same video.</p>
      <iframe
        width="560"
        height="315"
        src="https://www.youtube.com/embed/b9VX6qipe84"
        title="YouTube video player"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        referrerpolicy="strict-origin-when-cross-origin"
        allowfullscreen
      ></iframe>
    </div>
  </body>
</html>
